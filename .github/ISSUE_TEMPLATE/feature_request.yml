name: Feature Request
description: Suggest an improvement or new feature
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement! Help us make this project better.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature you'd like to see
      placeholder: "It would be helpful if..."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this feature be useful?
      placeholder: "This would solve..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches or solutions you've thought of
      placeholder: "Other possibilities..."

  - type: textarea
    id: implementation
    attributes:
      label: Possible Implementation
      description: Any ideas on how to implement this?
      placeholder: "We could..."
      render: python

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked that this feature hasn't been requested before
          required: true
        - label: This feature would be useful for the academic community
          required: false

